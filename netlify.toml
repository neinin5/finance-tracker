# Netlify deployment config for the Vue/Vite frontend.
# The backend lives separately on Render.

[build]
  # The frontend lives in /client
  base = "client"
  # Vite output directory (relative to `base`)
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Vue Router uses history mode — every unknown URL must serve index.html
# so client-side routing works (e.g. refreshing on /dashboard).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible cache headers for hashed Vite assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
